version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cobros_postgres
    environment:
      POSTGRES_USER: cobros_user
      POSTGRES_PASSWORD: cobros_dev_pass
      POSTGRES_DB: cobros_diarios
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobros_user -d cobros_diarios"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cobros_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://cobros_user:cobros_dev_pass@postgres:5432/cobros_diarios
      JWT_ACCESS_SECRET: change-me-to-random-64-char-string
      JWT_REFRESH_SECRET: change-me-to-another-random-64-char-string
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cobros_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: cobros_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cobros.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools
    restart: unless-stopped

volumes:
  pgdata:
