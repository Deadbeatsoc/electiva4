services:
  - type: web
    name: cobros-demo
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: "3001"
      - key: PRISMA_SYNC_SCHEMA
        value: "true"
      - key: PRISMA_SEED
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
